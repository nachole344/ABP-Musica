{% extends "base.html" %}
{% block title %}Álbumes{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Álbumes</h1>
    <a href="{{ url_for('main.new_album') }}" class="btn btn-success">+ Nuevo álbum</a>
</div>
<div class="row">
    {% for album in albums %}
    <div class="col-md-3 mb-3">
        <div class="card h-100">
            <img src="{{ album.cover_album }}" class="card-img-top" alt="{{ album.album_title }}" style="height:200px;object-fit:cover;" onerror="this.src='https://via.placeholder.com/300x200?text=No+Cover'">
            <div class="card-body">
                <h5 class="card-title">{{ album.album_title }}</h5>
                <p class="card-text text-muted">{{ album.artist.artist_name }} · {{ album.release_date.year }}</p>
                <a href="{{ url_for('main.view_album', album_id=album.album_id) }}" class="btn btn-sm btn-success">Ver</a>
            </div>
        </div>
    </div>
    {% else %}
    <p class="text-muted col-12">Sin álbumes.</p>
    {% endfor %}
</div>
{% endblock %}
