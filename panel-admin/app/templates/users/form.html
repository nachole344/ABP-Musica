{% extends "base.html" %}
{% block title %}Editar usuario{% endblock %}
{% block content %}

<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('main.view_user', user_id=user.user_id) }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="mb-0">Editar usuario: <span class="text-primary">{{ user.username }}</span></h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre de usuario</label>
                        <input type="text" name="username" class="form-control"
                               value="{{ user.username }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña nueva</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="Dejar en blanco para no cambiar">
                        <div class="form-text">Solo rellena este campo si quieres cambiar la contraseña.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Rol</label>
                        <select name="role" class="form-select" required>
                            <option value="user"  {{ 'selected' if user.role == 'user'  else '' }}>user</option>
                            <option value="admin" {{ 'selected' if user.role == 'admin' else '' }}>admin</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary fw-bold">
                            <i class="bi bi-check-lg me-1"></i>Guardar
                        </button>
                        <a href="{{ url_for('main.view_user', user_id=user.user_id) }}"
                           class="btn btn-outline-secondary">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
