{% extends "base.html" %}
{% block title %}Artistas{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Artistas</h1>
    <div class="d-flex gap-2">
        <a href="{{ url_for('admin.musicbrainz_import') }}" class="btn btn-warning"><i class="bi bi-cloud-download me-1"></i>Import</a>
        <a href="{{ url_for('admin.new_artist') }}" class="btn btn-primary">+ Nuevo artista</a>
    </div>
</div>
<div class="row">
    {% for artist in artists %}
    <div class="col-md-4 mb-3">
        <div class="card h-100">
            <img src="{{ artist.image }}" class="card-img-top" alt="{{ artist.artist_name }}" style="height:200px;object-fit:cover;" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
            <div class="card-body">
                <h5 class="card-title">{{ artist.artist_name }}</h5>
                <p class="card-text text-muted">{{ artist.real_name }} · {{ artist.country }}</p>
                <a href="{{ url_for('admin.view_artist', artist_id=artist.artist_id) }}" class="btn btn-sm btn-primary">Ver</a>
            </div>
        </div>
    </div>
    {% else %}
    <p class="text-muted col-12">No hay artistas. <a href="{{ url_for('admin.musicbrainz_import') }}">Importa uno</a>.</p>
    {% endfor %}
</div>
{% endblock %}
