{% extends "base.html" %}
{% block title %}{{ "Editar" if album else "Nuevo" }} Álbum{% endblock %}
{% block content %}
<h1>{{ "Editar" if album else "Nuevo" }} Álbum</h1>

{% if not album %}
<div class="card mb-4 border-warning">
    <div class="card-body">
        <h5 class="card-title"><i class="bi bi-cloud-download me-1"></i>Buscar en MusicBrainz</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Nombre del artista</label>
                <input type="text" id="mb-artist-name" class="form-control" placeholder="ej. Radiohead">
            </div>
            <div class="col-md-4">
                <label class="form-label">Nombre del álbum</label>
                <input type="text" id="mb-album-name" class="form-control" placeholder="ej. OK Computer">
            </div>
            <div class="col-md-4">
                <label class="form-label">O UUID del release</label>
                <input type="text" id="mb-release-id" class="form-control" placeholder="ej. b84ee12a-...">
            </div>
        </div>
        <div class="mt-3"><button class="btn btn-warning" onclick="mbSearchAlbum()">Buscar y seleccionar</button></div>
        <div id="mb-album-results" class="mt-3"></div>
    </div>
</div>
{% endif %}

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Artista</label>
        <select name="artist_id" id="f-artist_id" class="form-select" required>
            <option value="">Seleccionar...</option>
            {% for a in artists %}
            <option value="{{ a.artist_id }}" {{ "selected" if album and album.artist_id == a.artist_id else "" }}>{{ a.artist_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Título del álbum</label>
        <input type="text" name="album_title" id="f-album_title" class="form-control" value="{{ album.album_title if album else '' }}" required>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Fecha de lanzamiento</label>
            <input type="date" name="release_date" id="f-release_date" class="form-control" value="{{ album.release_date if album else '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Total de pistas</label>
            <input type="number" name="total_track" id="f-total_track" class="form-control" value="{{ album.total_track if album else '' }}" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Portada (URL)</label>
        <input type="text" name="cover_album" id="f-cover_album" class="form-control" value="{{ album.cover_album if album else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Spotify (URL)</label>
        <input type="text" name="spotify" id="f-spotify" class="form-control" value="{{ album.spotify if album else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">MusicBrainz Album ID (UUID)</label>
        <input type="text" name="mb_album_id" id="f-mb_album_id" class="form-control" value="{{ album.mb_album_id if album else '' }}" required>
    </div>
    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="{{ url_for('admin.list_albums') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}

{% block scripts %}
<script>
async function mbSearchAlbum() {
    const artistName = document.getElementById("mb-artist-name").value.trim();
    const albumName  = document.getElementById("mb-album-name").value.trim();
    const mbRelease  = document.getElementById("mb-release-id").value.trim();
    if (!artistName && !mbRelease) return alert("Introduce nombre de artista o UUID del release");
    const area = document.getElementById("mb-album-results");
    area.innerHTML = '<div class="text-muted">Buscando...</div>';
    try {
        const params = new URLSearchParams({ artist_name: artistName, album_name: albumName, mb_release: mbRelease });
        const r = await fetch(`/admin/api/musicbrainz/search/albums?${params}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        const list = Array.isArray(d) ? d : [d];
        area.innerHTML = '<div class="list-group mt-2"></div>';
        list.forEach(item => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "list-group-item list-group-item-action";
            btn.innerHTML = `<strong>${item.album_title}</strong> <small class="text-muted">${item.release_date || ""} · ${item.total_track} pistas</small>`;
            btn.onclick = () => {
                document.getElementById("f-album_title").value  = item.album_title  || "";
                document.getElementById("f-release_date").value = item.release_date || "";
                document.getElementById("f-total_track").value  = item.total_track  || "";
                document.getElementById("f-cover_album").value  = item.cover_album  || "";
                document.getElementById("f-spotify").value      = item.spotify      || "";
                document.getElementById("f-mb_album_id").value  = item.mb_album_id  || "";
                area.innerHTML = '<div class="text-success mt-2">✓ Campos rellenados desde MusicBrainz</div>';
            };
            area.querySelector(".list-group").appendChild(btn);
        });
    } catch (e) {
        area.innerHTML = `<div class="alert alert-danger mt-2">${e.message}</div>`;
    }
}
</script>
{% endblock %}
