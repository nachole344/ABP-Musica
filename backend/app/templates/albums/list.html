{% extends "base.html" %}

{% block title %}Albums{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Albums</h1>
    <a href="{{ url_for('main.new_album') }}" class="btn btn-success">+ New Album</a>
</div>

<div class="row">
    {% for album in albums %}
        <div class="col-md-3 mb-3">
            <div class="card">
                <img src="{{ album.cover_album }}" class="card-img-top" alt="{{ album.album_title }}" style="height:200px;object-fit:cover;">
                <div class="card-body">
                    <h5 class="card-title">{{ album.album_title }}</h5>
                    <p class="card-text text-muted">{{ album.artist.artist_name }} &middot; {{ album.release_date.year }}</p>
                    <a href="{{ url_for('main.view_album', album_id=album.album_id) }}" class="btn btn-sm btn-success">View</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
