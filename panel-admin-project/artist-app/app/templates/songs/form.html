{% extends "base.html" %}

{% block title %}{{ "Edit" if song else "New" }} Song{% endblock %}

{% block content %}
<h1>{{ "Edit" if song else "New" }} Song</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label class="form-label">Album</label>
        <select name="album_id" class="form-select" required>
            <option value="">Select...</option>
            {% for a in albums %}
                <option value="{{ a.album_id }}" {{ "selected" if song and song.album_id == a.album_id else "" }}>{{ a.album_title }} - {{ a.artist.artist_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="song_title" class="form-control" value="{{ song.song_title if song else '' }}" required>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Duration (HH:MM:SS)</label>
            <input type="text" name="duration" class="form-control" value="{{ song.duration if song else '' }}" placeholder="00:03:30" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Video URL</label>
        <input type="url" name="video_url" class="form-control" value="{{ song.video_url if song else '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Cover (URL)</label>
        <input type="url" name="cover_song" class="form-control" value="{{ song.cover_song if song else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">MusicBrainz Song ID (UUID)</label>
        <input type="text" name="mb_song_id" class="form-control" value="{{ song.mb_song_id if song else '' }}" required>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{{ url_for('main.list_songs') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
