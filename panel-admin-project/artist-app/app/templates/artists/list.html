{% extends "base.html" %}

{% block title %}Artists{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Artists</h1>
    <a href="{{ url_for('main.new_artist') }}" class="btn btn-primary">+ New Artist</a>
</div>

<div class="row">
    {% for artist in artists %}
        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="{{ artist.image }}" class="card-img-top" alt="{{ artist.artist_name }}" style="height:200px;object-fit:cover;">
                <div class="card-body">
                    <h5 class="card-title">{{ artist.artist_name }}</h5>
                    <p class="card-text text-muted">{{ artist.real_name }} &middot; {{ artist.country }}</p>
                    <a href="{{ url_for('main.view_artist', artist_id=artist.artist_id) }}" class="btn btn-sm btn-primary">View</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
