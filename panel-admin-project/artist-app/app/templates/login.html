<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Panel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; display: flex; align-items: center; min-height: 100vh; }
        .login-card { background: #16213e; border: 1px solid #0f3460; border-radius: 1rem; padding: 2rem; max-width: 400px; margin: 0 auto; width: 100%; }
        .login-card h1 { color: #e94560; font-weight: 900; text-align: center; margin-bottom: 2rem; }
        .form-control { background: #0f3460; border: none; color: #fff; padding: 0.75rem; }
        .form-control:focus { background: #0f3460; color: #fff; box-shadow: 0 0 0 2px #e94560; }
        .form-control::placeholder { color: #6c757d; }
        .btn-login { background: #e94560; border: none; padding: 0.75rem; font-weight: 700; width: 100%; }
        .btn-login:hover { background: #c73650; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>PANEL ADMIN</h1>
            {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Usuario" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-login text-white">ENTRAR</button>
            </form>
        </div>
    </div>
</body>
</html>
