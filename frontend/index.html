<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScape | Experience</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-w: 80px;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* WRAPPER PARA EMPUJAR CONTENIDO */
        #app-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            transition: all 0.3s ease;
        }

        /* SIDEBAR NAVIGATION (Desktop) */
        .sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .sidebar:hover { width: 220px; }
        .sidebar:hover .nav-label { display: block; opacity: 1; }
        
        .nav-label { 
            display: none; 
            opacity: 0;
            margin-left: 15px; 
            font-weight: 600; 
            white-space: nowrap; 
            transition: opacity 0.3s ease;
        }
        
        .sidebar-link {
            width: 100%;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none !important;
        }
        .sidebar:hover .sidebar-link { justify-content: flex-start; padding-left: 2rem; }
        .sidebar-link:hover, .sidebar-link.active { background: var(--glass); }
        
        /* Colores por Categoría */
        #nav-artists.active { border-right: 4px solid #3b82f6; color: #3b82f6; }
        #nav-artists:hover { color: #3b82f6; }

        #nav-shop.active { border-right: 4px solid #ef4444; color: #ef4444; }
        #nav-shop:hover { color: #ef4444; }

        #nav-extras.active { border-right: 4px solid #f59e0b; color: #f59e0b; }
        #nav-extras:hover { color: #f59e0b; }

        #nav-sustainability.active { border-right: 4px solid #10b981; color: #10b981; }
        #nav-sustainability:hover { color: #10b981; }

        /* MOBILE NAV */
        .mobile-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 1.5rem;
            z-index: 1100;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1200;
            display: none;
            flex-direction: column;
            padding: 5rem 2rem;
        }
        .mobile-menu-overlay.show { display: flex; }

        /* VIEWPORT PRINCIPAL */
        #main-content {
            flex-grow: 1;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        /* FULLSCREEN ARTIST SECTION */
        .artist-viewport {
            position: absolute;
            inset: 0;
            height: 100%;
            width: 100%;
        }
        
        /* ... resto de estilos de artist-slide, video-bg, nav-arrow, content-overlay sin cambios ... */
        .artist-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .artist-slide.active { opacity: 1; z-index: 10; }
        
        .video-bg {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }
        .artist-info h2 {
            font-size: 8vw;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }
        .nav-arrow:hover { background: rgba(255,255,255,0.2); }
        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        .content-overlay {
            position: absolute;
            inset: 0;
            background: #050505;
            z-index: 500;
            overflow-y: auto;
            padding: 4rem;
            display: none;
        }
        .content-overlay.active { display: block; }

        @media (max-width: 992px) {
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            #app-wrapper { flex-direction: column; }
            #main-content { padding-top: 60px; height: calc(100vh - 60px); }
            .nav-arrow { width: 45px; height: 45px; }
            .arrow-left { left: 10px; }
            .artist-info h2 { font-size: 15vw; }
            .content-overlay { 
                padding: 7rem 1.5rem 2rem 1.5rem; /* Aumento de padding superior para evitar solape con header */
            }
        }
        
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <!-- SIDEBAR (PC) -->
        <aside class="sidebar">
            <div class="mb-10 text-blue-500">
                <i data-lucide="music" size="32"></i>
            </div>
            <a id="nav-artists" class="sidebar-link active" onclick="showSection('artists')">
                <i data-lucide="mic-2"></i>
                <span class="nav-label">Artistas</span>
            </a>
            <a id="nav-shop" class="sidebar-link" onclick="showSection('shop')">
                <i data-lucide="shopping-bag"></i>
                <span class="nav-label">Tienda</span>
            </a>
            <a id="nav-extras" class="sidebar-link" onclick="showSection('extras')">
                <i data-lucide="star"></i>
                <span class="nav-label">Extras</span>
            </a>
            <a id="nav-sustainability" class="sidebar-link" onclick="showSection('sustainability')">
                <i data-lucide="leaf" class="text-emerald-500"></i>
                <span class="nav-label text-emerald-500">Eco</span>
            </a>
        </aside>

        <!-- MOBILE HEADER & MENU -->
        <header class="mobile-header">
            <div class="flex items-center gap-2 font-bold tracking-tighter text-lg">
                <span class="p-1 bg-blue-600 rounded-lg text-white"><i data-lucide="music" size="18"></i></span>
                SOUNDSCAPE
            </div>
            <button class="p-2 text-white" onclick="toggleMobileMenu()">
                <i data-lucide="menu"></i>
            </button>
        </header>

        <div id="mobile-menu" class="mobile-menu-overlay">
            <button class="absolute top-6 right-6 p-2 text-slate-400" onclick="toggleMobileMenu()">
                <i data-lucide="x" size="32"></i>
            </button>
            <nav class="flex flex-col gap-6 text-center mt-10">
                <a class="text-4xl font-bold" onclick="showSection('artists'); toggleMobileMenu()">Artistas</a>
                <a class="text-4xl font-bold" onclick="showSection('shop'); toggleMobileMenu()">Tienda</a>
                <a class="text-4xl font-bold" onclick="showSection('extras'); toggleMobileMenu()">Extras</a>
                <a class="text-4xl font-bold text-emerald-500" onclick="showSection('sustainability'); toggleMobileMenu()">Eco</a>
            </nav>
        </div>

        <!-- MAIN VIEWPORT -->
        <div id="main-content">
            <!-- SECCIÓN: ARTISTAS (FULLSCREEN CAROUSEL) -->
            <section id="artists-section" class="artist-viewport">
                <button class="nav-arrow arrow-left" onclick="prevArtist()"><i data-lucide="chevron-left"></i></button>
                <button class="nav-arrow arrow-right" onclick="nextArtist()"><i data-lucide="chevron-right"></i></button>
                
                <div id="artists-slides-container">
                    <!-- Los artistas se inyectarán aquí -->
                </div>
            </section>

            <!-- SECCIÓN: TIENDA -->
            <section id="shop-section" class="content-overlay">
                <h1 class="text-5xl md:text-7xl font-extrabold mb-12">MUSIC <span class="text-red-500">STORE</span></h1>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="shop-container">
                    <!-- Productos dinámicos -->
                </div>
            </section>

            <!-- SECCIÓN: EXTRAS -->
            <section id="extras-section" class="content-overlay">
                <h1 class="text-5xl md:text-7xl font-extrabold mb-12">EXTRAS & <span class="text-amber-500">EVENTS</span></h1>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <!-- Eventos dinámicos -->
                </div>
            </section>

            <!-- SECCIÓN: SOSTENIBILIDAD -->
            <section id="sustainability-section" class="content-overlay">
                <h1 class="text-5xl md:text-7xl font-extrabold mb-12 text-emerald-500">ECO <span class="text-white">MISSION</span></h1>
                <div class="bg-white/5 p-6 md:p-12 rounded-3xl border border-white/10 max-w-4xl">
                    <p class="text-xl md:text-2xl text-slate-300 leading-relaxed mb-8">Nuestra plataforma está diseñada para minimizar el impacto ambiental de la industria musical...</p>
                </div>
            </section>

            <!-- SECCIÓN: DETALLE DE ARTISTA (CATÁLOGO) -->
            <section id="catalog-overlay" class="content-overlay" style="z-index: 1500;">
                <button class="fixed top-8 right-8 p-3 bg-white/10 hover:bg-white/20 rounded-full transition-all z-[1600]" onclick="closeCatalog()">
                    <i data-lucide="x"></i>
                </button>
                
                <div id="catalog-content" class="max-w-6xl mx-auto">
                    <!-- El contenido se generará dinámicamente -->
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
